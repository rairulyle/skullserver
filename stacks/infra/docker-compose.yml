name: infra

networks:
  default:
    name: ${NETWORK_NAME}
    external: true

services:
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome:latest
    cap_add:
      - NET_ADMIN
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 784:784/udp
      - 853:853/tcp
      - 3000:3000/tcp
      - 2080:80/tcp
      - 2443:443/tcp
    volumes:
      - ${APP_DATA}/adguardhome/work:/opt/adguardhome/work
      - ${APP_DATA}/adguardhome/conf:/opt/adguardhome/conf
    restart: unless-stopped
    labels:
      npm.proxy.domain: adguard.${DOMAIN_NAME}
      npm.proxy.port: "2080"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/adguard-home.png
      net.unraid.docker.webui: https://adguard.${DOMAIN_NAME}

  adguardhome-sync:
    container_name: adguardhome-sync
    image: lscr.io/linuxserver/adguardhome-sync:latest
    user: ${PUID}:${PGID}
    ports:
      - 8082:8080
    volumes:
      - ${APP_DATA}/adguardsync:/config
    restart: unless-stopped
    labels:
      npm.proxy.domain: adguard-sync.${DOMAIN_NAME}
      npm.proxy.port: "8082"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/adguard-home.png
      net.unraid.docker.webui: https://adguard-sync.${DOMAIN_NAME}

  upsnap:
    container_name: upsnap
    image: ghcr.io/seriousm4x/upsnap:5
    network_mode: host
    environment:
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/upsnap:/app/pb_data
    restart: unless-stopped
    labels:
      npm.proxy.domain: upsnap.${DOMAIN_NAME}
      npm.proxy.port: "8090"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/upsnap.png
      net.unraid.docker.webui: https://upsnap.${DOMAIN_NAME}

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/cloudflare.png

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      TZ: ${TZ}
      CAPTCHA_SOLVER: none
      LOG_HTML: false
      LOG_LEVEL: info
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/flaresolverr.png
