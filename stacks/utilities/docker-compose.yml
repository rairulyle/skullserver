name: utilities

networks:
  default:
    name: ${NETWORK_NAME}
    external: true

services:
  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:latest
    hostname: SKULLSERVER
    environment:
      WATCHTOWER_CLEANUP: true
      WATCHTOWER_NOTIFICATIONS: shoutrrr
      WATCHTOWER_NOTIFICATION_URL: "discord://${DISCORD_TOKEN}@${DISCORD_ID}"
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APP_DATA}/watchtower/config.json:/config.json
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/watchtower.png

  speedtest-tracker:
    container_name: speedtest-tracker
    image: lscr.io/linuxserver/speedtest-tracker:latest
    ports:
      - "8081:80"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      SPEEDTEST_SCHEDULE: 0 */2 * * *
      PRUNE_RESULTS_OLDER_THAN: 90
      TZ: ${TZ}
      APP_KEY: ${SPEEDTEST_APP_KEY}
    volumes:
      - ${APP_DATA}/speedtest-tracker:/config
    restart: unless-stopped
    labels:
      npm.proxy.domain: speedtest.${DOMAIN_NAME}
      npm.proxy.port: "8081"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/speedtest-tracker.png
      net.unraid.docker.webui: https://speedtest.${DOMAIN_NAME}

  meralco-ph:
    container_name: meralco-ph
    image: ghcr.io/rairulyle/meralco-ph:latest
    ports:
      - "5000:5000"
    environment:
      TZ: ${TZ}
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/xmr.png

  upsnap:
    container_name: upsnap
    image: ghcr.io/seriousm4x/upsnap:5
    network_mode: host
    environment:
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/upsnap:/app/pb_data
    restart: unless-stopped
    labels:
      npm.proxy.domain: upsnap.${DOMAIN_NAME}
      npm.proxy.port: "8090"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/upsnap.png
      net.unraid.docker.webui: https://upsnap.${DOMAIN_NAME}

  tautulli:
    container_name: tautulli
    image: lscr.io/linuxserver/tautulli:latest
    ports:
      - 8181:8181
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/tautulli:/config
    restart: unless-stopped
    labels:
      npm.proxy.domain: tautulli.${DOMAIN_NAME}
      npm.proxy.port: "8181"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tautulli.png
      net.unraid.docker.webui: https://tautulli.${DOMAIN_NAME}

  profilarr:
    container_name: profilarr
    image: santiagosayshey/profilarr:latest
    ports:
        - 6868:6868
    environment:
        PUID: ${PUID}
        PGID: ${PGID}
        TZ: ${TZ}
    volumes:
        - ${APP_DATA}/profilarr:/config
    restart: unless-stopped
    labels:
      npm.proxy.domain: profilarr.${DOMAIN_NAME}
      npm.proxy.port: "6868"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/profilarr.png
      net.unraid.docker.webui: https://profilarr.${DOMAIN_NAME}
    
  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      UMASK_SET: 002
      serverIP: 0.0.0.0
      serverPort: 8266
      webUIPort: 8265
      internalNode: false
      inContainer: true
      ffmpegVersion: 7
      auth: false
      openBrowser: true
      maxLogSizeMB: 10
      cronPluginUpdate: ""
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ${APP_DATA}/tdarr/server:/app/server
      - ${APP_DATA}/tdarr/configs:/app/configs
      - ${APP_DATA}/tdarr/logs:/app/logs
      - ${DATA}:/mnt/data
      - /mnt/user/mosou:/mnt/mosou
      - ${DATA}/cache:/temp
    restart: unless-stopped
    labels:
      npm.proxy.domain: tdarr.${DOMAIN_NAME}
      npm.proxy.port: "8265"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tdarr.png
      net.unraid.docker.webui: https://tdarr.${DOMAIN_NAME}

  qui:
    container_name: qui
    image: ghcr.io/autobrr/qui:latest
    user: ${PUID}:${PGID}
    ports:
      - 7476:7476
    environment:
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/qui:/config
      - ${DATA}:/data
    restart: unless-stopped
    labels:
      npm.proxy.domain: qui.${DOMAIN_NAME}
      npm.proxy.port: "7476"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/qui.png
      net.unraid.docker.webui: https://qui.${DOMAIN_NAME}

  autobrr:
    container_name: autobrr
    image: ghcr.io/autobrr/autobrr:latest
    user: ${PUID}:${PGID}
    ports:
      - 7474:7474
    environment:
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/autobrr:/config
    restart: unless-stopped
    labels:
      npm.proxy.domain: autobrr.${DOMAIN_NAME}
      npm.proxy.port: "7474"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/autobrr.png
      net.unraid.docker.webui: https://autobrr.${DOMAIN_NAME}

  znc:
    container_name: znc
    image: lscr.io/linuxserver/znc:latest
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/znc:/config
    ports:
      - 6501:6501
    restart: unless-stopped
    labels:
      npm.proxy.domain: znc.${DOMAIN_NAME}
      npm.proxy.port: "6501"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/znc.png
      net.unraid.docker.webui: https://znc.${DOMAIN_NAME}

  thelounge:
    container_name: thelounge
    image: lscr.io/linuxserver/thelounge:latest
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/thelounge:/config
    ports:
      - 9000:9000
    restart: unless-stopped
    labels:
      npm.proxy.domain: irc.${DOMAIN_NAME}
      npm.proxy.port: "9000"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/thelounge.png
      net.unraid.docker.webui: https://irc.${DOMAIN_NAME}