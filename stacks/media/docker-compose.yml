name: media

networks:
  default:
    name: ${NETWORK_NAME}
    external: true

services:
  plex:
    container_name: plex
    image: lscr.io/linuxserver/plex:latest
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    environment:
      UMASK: ${UMASK}
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
      VERSION: latest
    volumes:
      - ${APP_DATA}/plex:/config
      - ${DATA}:/data
      - ${REMOTE1_DATA}:/remote/seedbox1/data
    restart: unless-stopped
    labels:
      npm.proxy.domain: plex.${DOMAIN_NAME}
      npm.proxy.port: "32400"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/plex.png
      net.unraid.docker.webui: https://plex.${DOMAIN_NAME}

  plexautolanguages:
    container_name: plexautolanguages
    image: journeyover/plex-auto-languages:latest
    environment:
      PLEX_URL: http://${IP_ADDRESS}:32400
      PLEX_TOKEN: ${PLEX_API_KEY}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/plexautolanguages:/config
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/plex-meta-manager.png
    
  plextraktsync:
    container_name: plextraktsync
    image: lscr.io/linuxserver-labs/plextraktsync:latest
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/plextraktsync:/config
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/trakt.png

  plexcache:
    container_name: plexcache
    image: ghcr.io/studionirin/plexcache-d:latest
    ports:
      - 5757:5757
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/plexcache:/config
      - /mnt/cache:/mnt/cache
      - /mnt/user0:/mnt/user0
      - /mnt/user:/mnt/user
      - /usr/local/emhttp:/usr/local/emhttp
      - /tmp/notifications:/tmp/notifications
    restart: unless-stopped
    labels:
      npm.proxy.domain: plexcache.${DOMAIN_NAME}
      npm.proxy.port: "5757"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/plexdrive.png
      net.unraid.docker.webui: https://plexcache.${DOMAIN_NAME}

  plex-previews:
    container_name: plex-previews
    image: stevezzau/plex_generate_vid_previews:latest
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "8083:8080"
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      # Media share (read-only) — use the same path as your Plex container
      - ${DATA}:/data
      # Plex appdata (read-write for BIF files)
      - ${APP_DATA}/plex/Library/Application Support/Plex Media Server:/plex:rw
      # App config storage
      - ${APP_DATA}/plex-previews:/config:rw
    restart: unless-stopped
    labels:
      npm.proxy.domain: plexpreviews.${DOMAIN_NAME}
      npm.proxy.port: "8083"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/plex-meta-manager-light.png
      net.unraid.docker.webui: https://plexpreviews.${DOMAIN_NAME}

  kometa:
    container_name: kometa
    image: lscr.io/linuxserver/kometa:latest
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      KOMETA_TIME: 05:00
      KOMETA_RUN: true
    volumes:
      - ${APP_DATA}/kometa:/config
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/kometa.png

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    ports:
      - 5055:5055
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
    volumes:
      - ${APP_DATA}/seerr:/app/config
    restart: unless-stopped
    labels:
      npm.proxy.domain: request.${DOMAIN_NAME}
      npm.proxy.port: "5055"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/overseerr.png
      net.unraid.docker.webui: https://request.${DOMAIN_NAME}

  suwayomi:
    container_name: suwayomi
    image: ghcr.io/suwayomi/suwayomi-server:preview
    user: ${PUID}:${PGID}
    ports:
      - "4567:4567"
    environment:
      TZ: ${TZ}
      FLARESOLVERR_ENABLED: true
      FLARESOLVERR_URL: http://flaresolverr:8191
    volumes:
      - ${APP_DATA}/suwayomi:/home/suwayomi/.local/share/Tachidesk
      - ${DATA}:/data
    restart: unless-stopped
    labels:
      npm.proxy.domain: suwayomi.${DOMAIN_NAME}
      npm.proxy.port: "4567"
      net.unraid.docker.icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/suwayomi.png
      net.unraid.docker.webui: https://suwayomi.${DOMAIN_NAME}
